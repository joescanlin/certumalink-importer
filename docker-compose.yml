# Local + CI Postgres for Certuma Reach (Phase 0 task C2).
# Local dev only: the credentials here are non-secret. Production DSN/secrets come
# from the secret store via certuma/config.py, never from this file.
services:
  db:
    image: postgres:16-alpine
    container_name: certuma-db
    environment:
      POSTGRES_USER: certuma
      POSTGRES_PASSWORD: certuma
      POSTGRES_DB: certuma
    ports:
      - "55433:5432"   # isolated host port (55432 is taken by the existing certumalocal stack)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certuma -d certuma"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - certuma_pgdata:/var/lib/postgresql/data

  # Isolated Mailpit for Certuma Reach dev/tests (own ports; the certumalocal stack's Mailpit
  # on 11025/18025 is left untouched). SMTP 11026, web/API 18026.
  mailpit:
    image: axllent/mailpit:latest
    container_name: certuma-mailpit
    ports:
      - "11026:1025"
      - "18026:8025"

volumes:
  certuma_pgdata:
